<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <main class="main">
      <div class="tabs"></div>
      <div class="combobox">
        <section class="section">
          <select name="lenguajes" id="lenguajes-select" multiple>
            <option value="" disabled selected>Search Values</option>
            <option value="Javascript">Javascript</option>
            <option value="Java">Java</option>
            <option value="C">C</option>
            <option value="C++">C++</option>
            <option value="Python">Python</option>
          </select>
          <div class="custom-select">
            <div class="custom-select__input-container">
              <input
                name="custom-select-input"
                type="text"
                class="custom-select__input"
                placeholder="Search values"
              />
            </div>
            <div class="custom-select__dropdown hidden">
              <ul class="custom-select__option-list"></ul>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
