<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <a href="#" aria-label="Flashcard home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="6" width="13" height="13" rx="2"></rect>
        <path d="M8 3h11a2 2 0 0 1 2 2v11"></path>
      </svg>
      <span>Flashcard</span>
    </a>
    <nav aria-label="View mode">
      <button type="button">Study Mode</button>
      <button type="button">All Cards</button>
    </nav>
  </header>

  <main>

    <section aria-label="Study area">

      <header>
        <button type="button">
          <span>All Categories</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 9l6 6 6-6"></path>
          </svg>
        </button>
        <label>
          <input type="checkbox">
          Hide Mastered
        </label>
        <button type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 3h5v5"></path>
            <path d="M4 20 21 3"></path>
            <path d="M21 16v5h-5"></path>
            <path d="M15 15l6 6"></path>
            <path d="M4 4l5 5"></path>
          </svg>
          Shuffle
        </button>
      </header>

      <article>
        <span>Web Development</span>

        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2c.4 4.6 4 8.2 8.6 8.6v.8C16 11.8 12.4 15.4 12 20c-.4-4.6-4-8.2-8.6-8.6v-.8C8 14.2 11.6 10.6 12 2z"></path>
        </svg>

        <h2>What does HTML stand for?</h2>
        <p>Click to reveal answer</p>

        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2c.4 4.6 4 8.2 8.6 8.6v.8C16 11.8 12.4 15.4 12 20c-.4-4.6-4-8.2-8.6-8.6v-.8C8 14.2 11.6 10.6 12 2z"></path>
        </svg>

        <footer>
          <progress value="0" max="5"></progress>
          <span>0/5</span>
        </footer>
      </article>

      <div>
        <button type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M8 12l3 3 5-6"></path>
          </svg>
          I Know This
        </button>
        <button type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 2.6-6.3"></path>
            <path d="M3 4v4h4"></path>
          </svg>
          Reset Progress
        </button>
      </div>

      <footer>
        <button type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 6l-6 6 6 6"></path>
          </svg>
          Previous
        </button>
        <span>Card 1 of 40</span>
        <button type="button">
          Next
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 6l6 6-6 6"></path>
          </svg>
        </button>
      </footer>

    </section>

    <aside aria-label="Study statistics">
      <h2>Study Statistics</h2>
      <ul>

        <li>
          <div>
            <p>Total Cards</p>
            <strong>40</strong>
          </div>
          <div>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3l9 5-9 5-9-5 9-5z"></path>
              <path d="M3 13l9 5 9-5"></path>
            </svg>
          </div>
        </li>

        <li>
          <div>
            <p>Mastered</p>
            <strong>11</strong>
          </div>
          <div>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor" stroke="none"></path>
            </svg>
          </div>
        </li>

        <li>
          <div>
            <p>In Progress</p>
            <strong>21</strong>
          </div>
          <div>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 5C9.5 3.5 6 3.5 3 5v14c3-1.5 6.5-1.5 9 0 2.5-1.5 6-1.5 9 0V5c-3-1.5-6.5-1.5-9 0z"></path>
              <path d="M12 5v14"></path>
            </svg>
          </div>
        </li>

        <li>
          <div>
            <p>Not Started</p>
            <strong>8</strong>
          </div>
          <div>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M5 5h14l2 8v6H3v-6l2-8z"></path>
              <path d="M3 13h5l1.5 2.5h5L16 13h5"></path>
            </svg>
          </div>
        </li>

      </ul>
    </aside>

  </main>

</body>
</html>
